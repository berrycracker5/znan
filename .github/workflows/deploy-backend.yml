name: Deploy Backend to Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Zip bundled code
        run: |
          mkdir -p lambda-dist
          cp -r src package.json package-lock.json node_modules lambda-dist/
          cd lambda-dist
          zip -r ../znan-was-lambda.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name znan-was-lambda \
            --zip-file fileb://znan-was-lambda.zip
